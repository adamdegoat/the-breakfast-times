<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Breakfast Times">
  <defs>
    <clipPath id="seal"><circle cx="60" cy="60" r="50"/></clipPath>
  </defs>
  <!-- newspaper-text imprint behind the sun (typewriter, clearly visible mottled greys) -->
  <g clip-path="url(#seal)" font-family="'Courier New',Courier,monospace" font-size="3.6" letter-spacing="0.1">
    <text x="9" y="15" fill="#3f3a34" opacity="0.55">THE BREAKFAST TIMES No.1</text>
    <text x="9" y="22" fill="#6f675d" opacity="0.34">morning edition — good news</text>
    <text x="9" y="29" fill="#322e29" opacity="0.60">from around the world, and</text>
    <text x="9" y="36" fill="#7a7268" opacity="0.30">two short stories to read with</text>
    <text x="9" y="43" fill="#46413a" opacity="0.50">your coffee. all the good that</text>
    <text x="9" y="50" fill="#322e29" opacity="0.58">is fit to print. est. mmxxvi.</text>
    <text x="9" y="57" fill="#6f675d" opacity="0.32">weather: fair. outlook: kind.</text>
    <text x="9" y="86" fill="#736b61" opacity="0.34">a small good thing, daily —</text>
    <text x="9" y="93" fill="#3f3a34" opacity="0.54">stay hydrated. be early. begin.</text>
    <text x="9" y="100" fill="#6a6258" opacity="0.36">fresh every single morning ——</text>
    <text x="9" y="107" fill="#3a352f" opacity="0.50">good news. good stories. daily.</text>
  </g>
  <!-- seal -->
  <circle cx="60" cy="60" r="55" fill="none" stroke="#db5a3c" stroke-width="2.4"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#eaa42e" stroke-width="1"/>
  <!-- rays -->
  <g stroke="#eaa42e" stroke-width="2.8" stroke-linecap="round">
    <line x1="60" y1="48" x2="60" y2="40"/>
    <line x1="73.0" y1="51.5" x2="76.5" y2="45.4"/>
    <line x1="47.0" y1="51.5" x2="43.5" y2="45.4"/>
    <line x1="82.5" y1="61.0" x2="88.6" y2="57.5"/>
    <line x1="37.5" y1="61.0" x2="31.4" y2="57.5"/>
  </g>
  <!-- sun -->
  <path d="M40 74 a20 20 0 0 1 40 0 Z" fill="#db5a3c"/>
  <!-- horizon -->
  <line x1="26" y1="74" x2="94" y2="74" stroke="#db5a3c" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="30" y1="80" x2="90" y2="80" stroke="#eaa42e" stroke-width="1.5" stroke-linecap="round"/>
</svg>
